<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Intelligence Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: white;
            font-size: 32px;
            margin-bottom:8px;
            text-shadow: 02px 10px rgba(0,0,0,0.2);
        }
        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
        }
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: calc(100vh - 140px);
            min-height: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .chat-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        .footer {
            margin-top: 15px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
        .login-hint {
            background: rgba(255,255,255,0.15);
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            color: white;
            font-size: 14px;
        }
        .login-hint strong {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 BI Assistant</h1>
        <p>Business Intelligence at your fingertips</p>
    </div>
    <div class="login-hint">
        💡 <strong>Login:</strong> Enter your phone number (e.g., 0764964349) and password to access your data
    </div>
    <div class="chat-container">
        <iframe
            src="https://sim.so/chat/business-intelligence-assistant"
            class="chat-frame"
            allow="clipboard-write"
            title="BI Assistant Chat">
        </iframe>
    </div>
    <div class="footer">
        Powered by Sim Studio • Role-based access control enabled
    </div>
</body>
</html>
